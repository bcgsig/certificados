<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCG0222026 — CHARAJA LARICO HAROLD EFRAÍN — BCG SIG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d2457;--green:#1ec26b;--green-lt:#3dd882;
      --white:#ffffff;--off-white:#e8edf8;--gray:#8a9ab5}
    html,body{height:100%;font-family:'Inter',sans-serif;
      background:var(--navy);color:var(--white);overflow:hidden}
    /* BAR */
    .bar{position:fixed;top:0;left:0;right:0;height:56px;
      background:rgba(10,20,50,.97);border-bottom:1px solid rgba(30,194,107,.15);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1.2rem;z-index:100;backdrop-filter:blur(12px)}
    .bar-left{display:flex;align-items:center;gap:10px;min-width:0}
    .back{display:flex;align-items:center;gap:5px;text-decoration:none;
      color:var(--gray);font-size:.78rem;font-weight:400;padding:6px 10px;
      border-radius:8px;transition:color .2s,background .2s;
      white-space:nowrap;flex-shrink:0}
    .back:hover{color:var(--green);background:rgba(30,194,107,.08)}
    .back svg{width:14px;height:14px;stroke:currentColor;fill:none}
    .sep{width:1px;height:22px;background:rgba(30,194,107,.15);flex-shrink:0}
    .bar-info{min-width:0}
    .bar-cert{font-size:.82rem;font-weight:500;color:var(--white);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-meta{font-size:.68rem;color:var(--gray);margin-top:1px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .brand-mini{display:none;align-items:center;margin-right:6px}
    .brand-mini img{height:28px;width:auto;
      filter:drop-shadow(0 1px 6px rgba(30,194,107,.15))}
    .btn-dl{display:flex;align-items:center;gap:7px;padding:8px 18px;
      background:var(--green);border:none;border-radius:10px;color:#0a1e3d;
      font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;
      letter-spacing:.04em;cursor:pointer;text-decoration:none;
      transition:background .2s,transform .15s,box-shadow .2s;
      box-shadow:0 2px 12px rgba(30,194,107,.25)}
    .btn-dl:hover{background:var(--green-lt);transform:translateY(-1px);
      box-shadow:0 4px 20px rgba(30,194,107,.35)}
    .btn-dl:active{transform:translateY(0)}
    .btn-dl svg{width:14px;height:14px;stroke:#0a1e3d;fill:none;flex-shrink:0}
    /* VIEWER */
    .viewer{position:fixed;top:56px;left:0;right:0;bottom:0;background:#1a1a2e}
    .viewer iframe{width:100%;height:100%;border:none;display:block}
    /* FALLBACK */
    .fallback{display:none;flex-direction:column;align-items:center;
      justify-content:center;height:100%;gap:1.6rem;padding:2rem;
      text-align:center;background:var(--navy)}
    .fb-icon{width:76px;height:76px;border:1.5px solid rgba(30,194,107,.25);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:rgba(30,194,107,.06)}
    .fb-icon svg{width:32px;height:32px;stroke:var(--green);fill:none}
    .fallback h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
    .fallback p{font-size:.85rem;color:var(--gray);max-width:340px;line-height:1.65}
    .fb-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;
      background:var(--green);border-radius:12px;color:#0a1e3d;
      font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;
      text-decoration:none;letter-spacing:.03em;
      transition:background .2s,transform .15s;
      box-shadow:0 4px 20px rgba(30,194,107,.3)}
    .fb-btn:hover{background:var(--green-lt);transform:translateY(-1px)}
    .fb-btn svg{width:16px;height:16px;stroke:#0a1e3d;fill:none}
    @media(min-width:860px){.brand-mini{display:flex}}
    @media(max-width:580px){.bar-meta{display:none}
      .btn-dl span{display:none}.btn-dl{padding:8px 12px}}
  </style>
</head>
<body>
<div class="bar">
  <div class="bar-left">
    <a href="../../" class="back">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Volver
    </a>
    <div class="sep"></div>
    <div class="bar-info">
      <div class="bar-cert">Evacuación en Caso de Emergencias</div>
      <div class="bar-meta">CHARAJA LARICO HAROLD EFRAÍN &nbsp;·&nbsp; Código: BCG0222026</div>
    </div>
  </div>
  <div class="bar-right">
    <div class="brand-mini">
      <img src="../../Logo_Horizontal_3.png" alt="BCG SIG">
    </div>
    <a class="btn-dl" href="BCG0222026.pdf" download="BCG0222026.pdf">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span>Descargar PDF</span>
    </a>
  </div>
</div>

<div class="viewer" id="viewer">
  <iframe id="pdf-frame"
    src="BCG0222026.pdf#toolbar=1&navpanes=0&view=FitH"
    title="Certificado BCG0222026 — CHARAJA LARICO HAROLD EFRAÍN"></iframe>
</div>

<div class="fallback" id="fallback">
  <div class="fb-icon">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  </div>
  <h2>Tu certificado está listo</h2>
  <p>Tu navegador no puede mostrar el PDF en línea. Descárgalo para visualizarlo.</p>
  <a class="fb-btn" href="BCG0222026.pdf" download="BCG0222026.pdf">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descargar Certificado
  </a>
</div>

<script>
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isIOS) {
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  }
  document.getElementById('pdf-frame').addEventListener('error', () => {
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  });
</script>
</body>
</html>
